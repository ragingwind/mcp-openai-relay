services:
  relay:
    build: .
    image: mcp-openai-relay
    ports:
      - "${HOST_PORT:-3939}:3000"
    env_file:
      - .env.local
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:'+(process.env.PORT||3000)+'/api/mcp').then(r=>process.exit(r.status>=500?1:0)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
